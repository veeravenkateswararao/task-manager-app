apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: taskmgr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: venkyveera/backend-task:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: MONGODB_URI
              value: mongodb://10.0.3.76:27017/taskdb

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: taskmgr
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
  type: ClusterIP
